services:
  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: pulsedev
      POSTGRES_USER: pulsedev
      POSTGRES_PASSWORD: pulsedev
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U pulsedev"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
      dockerfile: packages/api/Dockerfile
    ports:
      - "10100:10100"
    environment:
      DATABASE_URL: postgres://pulsedev:pulsedev@postgres:5432/pulsedev
      PULSECHAIN_RPC_URL: ${PULSECHAIN_RPC_URL:-https://rpc.pulsechain.com}
      DEBUG_RPC_URL: ${DEBUG_RPC_URL:-}
      BLOCKSCOUT_API_URL: ${BLOCKSCOUT_API_URL:-https://api.scan.pulsechain.com/api}
      PORT: "10100"
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  web:
    build:
      context: .
      dockerfile: packages/web/Dockerfile
    ports:
      - "8080:80"
    depends_on:
      - api
    restart: unless-stopped

volumes:
  pgdata:
