name: Publish SDK

# Triggers:
#   - push to main      → if the version in packages/sdk/package.json isn't
#                         already on npm, publish it on the `latest` dist-tag.
#                         If the version IS already published, skip silently
#                         (no error). Bumping the version is the only signal
#                         needed to ship a release.
#   - push to staging   → publish as `<base>-rc.<run_number>` on the `rc`
#                         dist-tag. Users opt in with `npm install
#                         @valve-tech/trace-sdk@rc`. Stable users are not
#                         affected. Each push gets a unique RC number.
#   - sdk-v* tag push   → escape hatch for re-publishing a specific commit.
#                         Same skip-if-already-published behavior as main.
#   - workflow_dispatch → manual escape hatch.
on:
  push:
    branches: [main, staging]
    tags:
      - "sdk-v*"
  workflow_dispatch: {}

# Trusted publishing needs id-token:write so the workflow can mint a short-lived
# OIDC token that npm exchanges for publish auth — no NPM_TOKEN secret needed.
permissions:
  contents: read
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: packages/sdk

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          registry-url: "https://registry.npmjs.org"
          cache: "npm"

      # npm >= 11.5.1 is required for OIDC trusted publishing.
      - name: Upgrade npm
        run: npm install -g npm@latest

      - name: Install workspace deps
        run: npm ci
        working-directory: .

      - name: Typecheck
        run: npm run typecheck

      - name: Test
        run: npm test

      - name: Build
        run: npm run build

      # For main and sdk-v* tag pushes: only publish if the version isn't
      # already on npm. `npm view <pkg>@<v> version` outputs the version
      # string when published, empty when not.
      - name: Check if version already published (stable)
        id: check_published
        if: github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/sdk-v')
        run: |
          VERSION=$(node -p "require('./package.json').version")
          PUBLISHED=$(npm view "@valve-tech/trace-sdk@${VERSION}" version 2>/dev/null || true)
          if [ -n "$PUBLISHED" ]; then
            echo "Version ${VERSION} is already on npm — skipping publish"
            echo "should_publish=false" >> "$GITHUB_OUTPUT"
          else
            echo "Version ${VERSION} is not on npm yet — will publish"
            echo "should_publish=true" >> "$GITHUB_OUTPUT"
          fi

      # Strip any existing prerelease suffix off the package.json version, then
      # append `-rc.<run_number>`. Keeps RC versions monotonic per workflow
      # run and prevents `0.3.0-rc.5-rc.42` if staging's package.json is mid
      # release cycle.
      - name: Set RC version (staging only)
        if: github.ref == 'refs/heads/staging'
        env:
          RUN_NUMBER: ${{ github.run_number }}
        run: |
          BASE_VERSION=$(node -p "require('./package.json').version.split('-')[0]")
          RC_VERSION="${BASE_VERSION}-rc.${RUN_NUMBER}"
          echo "Publishing as ${RC_VERSION}"
          npm version "$RC_VERSION" --no-git-tag-version

      - name: Publish to npm (stable — main / tag)
        if: (github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/sdk-v')) && steps.check_published.outputs.should_publish == 'true'
        run: npm publish --provenance --access public
        # No NPM_TOKEN env var — auth comes from the OIDC id-token above,
        # exchanged with the trusted-publisher rule configured on npmjs.com.

      - name: Publish to npm (rc — staging)
        if: github.ref == 'refs/heads/staging'
        run: npm publish --provenance --access public --tag rc
