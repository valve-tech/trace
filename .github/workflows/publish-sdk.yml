name: Publish SDK

# Fires when an `sdk-vX.Y.Z` tag is pushed. To ship a new version:
#   1. Bump `version` in packages/sdk/package.json on main
#   2. git tag sdk-v0.1.x && git push --tags
on:
  push:
    tags:
      - "sdk-v*"
  # Also allow manual dispatch as an escape hatch if a tag push is misfired.
  workflow_dispatch: {}

# Trusted publishing needs id-token:write so the workflow can mint a short-lived
# OIDC token that npm exchanges for publish auth — no NPM_TOKEN secret needed.
permissions:
  contents: read
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: packages/sdk

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          registry-url: "https://registry.npmjs.org"
          cache: "npm"

      # npm >= 11.5.1 is required for OIDC trusted publishing.
      - name: Upgrade npm
        run: npm install -g npm@latest

      - name: Install workspace deps
        run: npm ci
        working-directory: .

      - name: Typecheck
        run: npm run typecheck

      - name: Test
        run: npm test

      - name: Build
        run: npm run build

      - name: Publish to npm
        run: npm publish --provenance --access public
        # No NPM_TOKEN env var — auth comes from the OIDC id-token above,
        # exchanged with the trusted-publisher rule configured on npmjs.com.

