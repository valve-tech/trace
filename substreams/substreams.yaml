specVersion: v0.1.0
package:
  name: valve_holdings
  version: v0.1.0
  url: https://explore.valve.city
  description: Append-only ERC-20 transfers archive (all tokens), for substreams-sink-sql. Portfolio discovery + balances are derived downstream.

imports:
  # sf.substreams.sink.database.v1.DatabaseChanges (db_out output type).
  database_change: https://github.com/streamingfast/substreams-sink-database-changes/releases/download/v4.0.0/substreams-sink-database-changes-v4.0.0.spkg
  # sf.substreams.sink.sql.v1.Service (sink config type).
  sql: https://github.com/streamingfast/substreams-sink-sql/releases/download/protodefs-v1.0.7/substreams-sink-sql-protodefs-v1.0.7.spkg

binaries:
  default:
    type: wasm/rust-v1
    file: ./target/wasm32-unknown-unknown/release/valve_holdings.wasm

network: pulsechain-testnet-v4

modules:
  # Stateless map over every block: decode all ERC-20 Transfer logs into
  # append-only `transfers` rows. No store, no curated filter — discovery and
  # current balances are derived downstream (see src/lib.rs). initialBlock
  # defaults to 0 (genesis); substreams parallelizes the historical range.
  - name: db_out
    kind: map
    inputs:
      - source: sf.ethereum.type.v2.Block
    output:
      type: proto:sf.substreams.sink.database.v1.DatabaseChanges

sink:
  module: db_out
  type: sf.substreams.sink.sql.v1.Service
  config:
    schema: "./schema.sql"
    engine: postgres
